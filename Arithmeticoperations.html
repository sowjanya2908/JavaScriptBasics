<!DOCTYPE html>
<html>
    <head>
        <title>Arithmetic Operations</title>
        <script>
            function onclickAdd() {
                debugger;
              var value1 = parseInt(document.getElementById("txtValue1").value);
               var value2 = parseInt(document.getElementById("txtValue2").value);
               var result = value1 + value2;
               document.getElementById("Presult").innerText = "Result: " + result;

            }
        </script>
    </head>
    <body>
        <h1>Arithmetic Operations</h1>
        <label>Value1</label>
        <input type="number" id="txtValue1">
        <br>
        <label>Value2</label>
        <input type="number" id="txtValue2">
        <br>
        <button id="btnAdd" onclick="onclickAdd()">Add</button>
        <button id="btnSubtract" onclick="onclickSubtract()">Subtract</button>
        <button id="btnMultiply" onclick="onclickMultiply()">Multiply</button>
        <button id="btnDivide" onclick="onclickDivide()">Divide</button>
        <br>
        <p id="Presult"></p>
    </body>
</html>
